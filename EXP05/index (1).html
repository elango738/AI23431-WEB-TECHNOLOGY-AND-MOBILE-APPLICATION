<!DOCTYPE html>
<html>
<head>
    <title>GET and POST Example</title>
    <style>
        body{
            margin:0;
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 15px gray;
            width:350px;
            text-align:center;
        }

        input{
            width:90%;
            padding:8px;
            margin:8px 0;
        }

        button{
            padding:8px 15px;
            margin:5px;
            border:none;
            color:white;
            cursor:pointer;
        }

        .getBtn{
            background:green;
        }

        .postBtn{
            background:red;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>User Form</h2>

    <!-- GET Form -->
    <form action="UserServlet" method="get">
        <input type="text" name="username" placeholder="Enter Name" required>
        <input type="email" name="email" placeholder="Enter Email" required>
        <button class="getBtn" type="submit">Submit using GET</button>
    </form>

    <hr>

    <!-- POST Form -->
    <form action="UserServlet" method="post">
        <input type="text" name="username" placeholder="Enter Name" required>
        <input type="email" name="email" placeholder="Enter Email" required>
        <button class="postBtn" type="submit">Submit using POST</button>
    </form>
</div>

</body>
</html>
